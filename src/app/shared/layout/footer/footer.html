<div class="footer">
  <div class="container">
    <div class="footer-top">
      <a routerLink="/">
        <img src="./images/logo.png" alt="logo">
      </a>
      <app-main-menu [isNavigated]="false"></app-main-menu>
    </div>
    <div class="footer-items">

      <div class="footer-column footer-address">
        <div class="footer-item-title">Адрес</div>
        <div class="footer-item-info">{{address}}</div>
      </div>

      <div class="footer-column footer-phone">
        <div class="footer-item-title">Телефон</div>
        <div class="footer-item-info" (click)="to_consult()">{{phone}}</div>
        <div class="footer-item-button">
          <button class="button small-button" (click)="to_consult()" >Перезвоните мне</button>
        </div>

      </div>

      <div class="footer-column footer-email">
        <div class="footer-item-title">E-mail</div>
        <div class="footer-item-info" (click)="to_email()" >{{email}}</div>
      </div>
